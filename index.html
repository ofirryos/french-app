<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="צרפתית">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>🇫🇷 לומד צרפתית</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#F5F5F7;color:#000;direction:rtl;max-width:390px;margin:0 auto;min-height:100vh;overflow-x:hidden}
:root{--blue:#007AFF;--green:#27DC03;--red:#E73D00;--orange:#FF9500;--gray:#6C757D;--card-radius:14px;--hdr:54px;--bc:32px}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:100;background:#fff;padding:0 12px;height:var(--hdr);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #E5E5EA;transition:box-shadow .2s}
.header.scrolled{box-shadow:0 2px 12px rgba(0,0,0,.1)}
.header-title{font-size:17px;font-weight:700;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px}
.header-actions{display:flex;gap:6px;min-width:72px}
.header-actions.left{justify-content:flex-end}
.header-actions.right{justify-content:flex-start}
.btn-icon{width:36px;height:36px;border-radius:50%;border:none;background:#F2F2F7;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .15s,background .15s;flex-shrink:0}
.btn-icon:active{transform:scale(.95);background:#E5E5EA}
.btn-icon.danger{background:#FFF0ED;color:var(--red)}
.btn-icon.danger:active{background:#FFE0D9}

/* ── BREADCRUMB ── */
.breadcrumb{height:var(--bc);background:#fff;border-bottom:1px solid #F0F0F5;padding:0 14px;display:flex;align-items:center;gap:4px;font-size:12px;color:var(--gray);overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.breadcrumb::-webkit-scrollbar{display:none}
.bc-item{cursor:pointer;color:var(--blue);font-weight:500;flex-shrink:0}
.bc-item.current{color:var(--gray);cursor:default;font-weight:400}
.bc-sep{flex-shrink:0;opacity:.5}

/* ── BUTTONS ── */
.btn{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:600;transition:transform .15s,opacity .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-secondary{background:#E5E5EA;color:#3C3C43}
.btn-orange{background:var(--orange);color:#fff}

/* ── SCREEN ── */
.screen{padding:12px 16px 100px;min-height:calc(100vh - var(--hdr))}
.screen.has-bc{padding-top:12px;min-height:calc(100vh - var(--hdr) - var(--bc))}
.screen.game-screen{padding:8px 12px 8px;display:flex;flex-direction:column;height:calc(100vh - var(--hdr) - var(--bc) - 1px);overflow:hidden}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--card-radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:transform .15s,box-shadow .15s;-webkit-user-select:none;user-select:none}
.card:active{transform:scale(.98);box-shadow:none}
.card-icon{font-size:22px;margin-left:12px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:13px;color:var(--gray);margin-top:2px}
.card-arrow{color:#C7C7CC;font-size:20px;flex-shrink:0;line-height:1}
.tag-recent{font-size:11px;background:#F2F2F7;color:var(--gray);padding:2px 8px;border-radius:6px;margin-top:4px;display:inline-block}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 24px;color:var(--gray);font-size:15px;line-height:1.6}
.empty-icon{font-size:48px;margin-bottom:12px}

/* ── INPUTS ── */
input[type=text],input[type=search]{width:100%;padding:12px 14px;border:1.5px solid #E5E5EA;border-radius:10px;font-size:16px;outline:none;transition:border-color .2s;background:#fff;color:#000}
input[type=text]:focus,input[type=search]:focus{border-color:var(--blue)}
input.from-dict{border-color:var(--blue);background:#F0F6FF}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:390px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;text-align:center}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-actions .btn{flex:1}
.modal-label{font-size:13px;color:var(--gray);margin-bottom:6px;font-weight:500}

/* ── DROPDOWN ── */
.dropdown{position:absolute;z-index:50;background:#fff;border:1px solid #E5E5EA;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);max-height:200px;overflow-y:auto;width:100%;left:0;top:100%;margin-top:4px}
.dropdown-item{padding:12px 14px;cursor:pointer;font-size:15px;transition:background .1s;display:flex;justify-content:space-between;align-items:center}
.dropdown-item:hover,.dropdown-item:active{background:#F2F2F7}
.dd-fr{direction:ltr;text-align:left}
.dd-he{color:var(--gray);font-size:13px}

/* ── INPUT WRAP ── */
.inp-wrap{position:relative;margin-bottom:12px}

/* ── SECTIONS ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px}
.section-title{font-size:17px;font-weight:700}
.link-btn{background:none;border:none;color:var(--blue);font-size:13px;cursor:pointer;padding:4px 8px;font-weight:600}

/* ── WORD ROW ── */
.word-row{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:background .15s}
.word-row:active{background:#F5F5F7}
.word-fr{direction:ltr;font-size:15px;font-weight:600;flex:1;text-align:left}
.word-he{font-size:15px;color:#444;flex:1;text-align:right}
.word-tts{background:none;border:none;font-size:18px;cursor:pointer;opacity:.5;padding:2px 4px;flex-shrink:0}
.word-tts:active{opacity:1}

/* ── ACTION BAR ── */
.action-bar{display:flex;gap:10px;margin-bottom:14px}
.action-bar .btn{flex:1;padding:13px 8px;font-size:14px}

/* ── PROGRESS ── */
.progress-bar{height:6px;background:#E5E5EA;border-radius:3px;overflow:hidden;margin-bottom:12px;flex-shrink:0}
.progress-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
.progress-fill.orange{background:var(--orange)}
.progress-fill.red{background:var(--red)}
.counter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0}
.counter-label{font-size:13px;color:var(--gray)}
.counter-num{font-size:13px;font-weight:700;color:var(--blue)}

/* ── FLASHCARDS ── */
.flashcard-wrap{perspective:1000px;width:100%;flex:0 0 200px;cursor:pointer;margin-bottom:16px}
.flashcard{width:100%;height:200px;position:relative;transform-style:preserve-3d;transition:transform .35s ease-in-out}
.flashcard.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:20px;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;padding:24px}
.card-face.back{transform:rotateY(180deg)}
.card-word{font-size:28px;font-weight:700;text-align:center;margin-bottom:8px}
.card-word.fr{direction:ltr}
.card-word.he{direction:rtl}
.card-tts{font-size:24px;cursor:pointer;margin-top:6px;opacity:.6;transition:opacity .15s;user-select:none}
.card-tts:hover{opacity:1}
.fc-actions{display:flex;gap:8px;flex-shrink:0}
.fc-btn{flex:1;padding:14px 8px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:700;transition:transform .15s}
.fc-btn:active{transform:scale(.97)}
.fc-know{background:#EAFEE6;color:#1A8C00}
.fc-forgot{background:#FFF0ED;color:#C0310A}
.fc-flip{background:#F2F2F7;color:#3C3C43}

/* ── MATCHING GAME ── */
.match-top{flex-shrink:0}
.match-timer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.match-timer{font-size:22px;font-weight:800;color:var(--blue);font-variant-numeric:tabular-nums;letter-spacing:-0.5px}
.match-timer.urgent{color:var(--red)}
.match-mode-btn{background:none;border:1px solid #E5E5EA;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray)}
.match-mode-btn.active{border-color:var(--orange);color:var(--orange);background:#FFF8F0}
.match-hs{font-size:12px;color:var(--gray);display:flex;align-items:center;gap:4px;margin-bottom:6px}
.match-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;overflow:hidden;min-height:0}
.match-col{display:flex;flex-direction:column;gap:6px;overflow:hidden;min-height:0}
.match-card{flex:1;padding:8px 6px;border-radius:12px;background:#fff;border:2px solid #E5E5EA;text-align:center;cursor:pointer;font-size:13px;font-weight:600;transition:all .12s;word-break:break-word;display:flex;align-items:center;justify-content:center;line-height:1.2;min-height:0}
.match-card.fr-card{direction:ltr}
.match-card.selected{border-color:var(--blue);background:#F0F6FF;color:var(--blue)}
.match-card.correct{border-color:var(--green);background:#EAFEE6;color:#1A8C00;pointer-events:none;animation:pulse-green .3s ease}
.match-card.wrong{border-color:var(--red);background:#FFF0ED;color:var(--red)}
.match-card.matched{opacity:.2;pointer-events:none;border-color:transparent;background:transparent;box-shadow:none}
@keyframes pulse-green{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}

/* ── FINISH ── */
.finish-screen{text-align:center;padding:32px 24px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.finish-icon{font-size:64px;margin-bottom:12px}
.finish-title{font-size:24px;font-weight:700;margin-bottom:6px}
.finish-sub{font-size:15px;color:var(--gray);margin-bottom:6px}
.finish-hs{font-size:16px;font-weight:700;color:var(--orange);margin-bottom:20px}
.finish-actions{display:flex;flex-direction:column;gap:10px;width:100%}

/* ── FOLDER NAV FOOTER ── */
.folder-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:#fff;border-top:1px solid #E5E5EA;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;padding-bottom:calc(8px + env(safe-area-inset-bottom));z-index:80}
.folder-nav-center{font-size:13px;color:var(--gray);font-weight:500;text-align:center;flex:1;padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-arrow-btn{width:40px;height:40px;border-radius:50%;border:none;background:#F2F2F7;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.nav-arrow-btn:active{background:#E5E5EA}
.nav-arrow-btn:disabled{opacity:.25;pointer-events:none}

/* ── MENU SHEET ── */
.menu-sheet{background:#fff;border-radius:20px 20px 0 0;padding:16px 0 32px;width:100%;max-width:390px}
.menu-item{padding:16px 24px;display:flex;align-items:center;gap:14px;cursor:pointer;font-size:16px;font-weight:500;transition:background .15s}
.menu-item:active{background:#F5F5F7}
.menu-item-icon{font-size:22px;width:28px;text-align:center}
.menu-sep{height:1px;background:#F0F0F5;margin:4px 0}
.menu-cancel{padding:16px 24px;text-align:center;color:var(--red);font-size:16px;font-weight:600;cursor:pointer}

/* ── SELECT ── */
.select-field{width:100%;padding:12px 14px;border:1.5px solid #E5E5EA;border-radius:10px;font-size:16px;outline:none;background:#fff;color:#000;appearance:none;-webkit-appearance:none;margin-bottom:12px}

/* ── OFFLINE ── */
.offline-banner{background:#FF9500;color:#fff;text-align:center;font-size:13px;padding:6px;font-weight:600;display:none}
.offline-banner.show{display:block}

/* ── HOME PRIMARY BTN ── */
.home-add-btn{width:100%;padding:16px;border-radius:14px;border:none;background:var(--blue);color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(0,122,255,.25);transition:transform .15s,box-shadow .15s}
.home-add-btn:active{transform:scale(.97);box-shadow:none}

/* ── RECENT WORDS ── */
.recent-word-row{background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.recent-word-fr{direction:ltr;font-size:14px;font-weight:600;flex:1;text-align:left;color:#000}
.recent-word-he{font-size:14px;color:#444;flex:1;text-align:right}
.recent-word-list{font-size:11px;color:var(--gray);flex-shrink:0}

/* ── STAR / HARD WORD ── */
.word-star{width:26px;height:26px;border-radius:50%;border:1.5px solid #D1D1D6;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;padding:0;font-size:13px;color:#C7C7CC;line-height:1}
.word-star:active{transform:scale(1.25)}
.word-star.hard{border-color:var(--orange);background:var(--orange);color:#fff}

/* ── QUIZ GAME ── */
.quiz-dir-toggle{display:flex;gap:8px;margin-bottom:10px;flex-shrink:0}
.quiz-dir-btn{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid #E5E5EA;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray);transition:all .15s}
.quiz-dir-btn.active{border-color:var(--blue);color:var(--blue);background:#F0F6FF}
.quiz-question{background:#fff;border-radius:16px;padding:18px 16px;text-align:center;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);flex-shrink:0}
.quiz-word{font-size:28px;font-weight:800;margin-bottom:6px;line-height:1.2}
.quiz-word.fr{direction:ltr}
.quiz-tts-row{display:flex;justify-content:center;margin-top:6px}
.quiz-tts-btn{background:#F2F2F7;border:none;border-radius:8px;padding:6px 16px;font-size:15px;cursor:pointer;font-weight:600}
.quiz-tts-btn:active{background:#E5E5EA}
.quiz-options{display:flex;flex-direction:column;gap:8px;flex:1;overflow-y:auto;min-height:0}
.quiz-opt{background:#fff;border:2px solid #E5E5EA;border-radius:12px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:15px;font-weight:500;transition:border-color .12s,background .12s;flex-shrink:0}
.quiz-opt:active{transform:scale(.98)}
.quiz-opt.correct-ans{border-color:var(--green);background:#EAFEE6;color:#1A8C00}
.quiz-opt.wrong-ans{border-color:var(--red);background:#FFF0ED;color:#E73D00}
.quiz-opt.reveal-ans{border-color:var(--green);background:#EAFEE6;color:#1A8C00}
.quiz-opt-text{flex:1}
.quiz-opt.fr-opt .quiz-opt-text{direction:ltr;text-align:left}
.quiz-opt-tts{background:none;border:none;font-size:16px;cursor:pointer;opacity:.45;flex-shrink:0;padding:2px 4px}
.quiz-opt-tts:active{opacity:1}
.quiz-next-btn{margin-top:8px;width:100%;flex-shrink:0}

/* ── LIST FLIP CARDS ── */
.view-toggle{display:flex;gap:6px;margin-bottom:12px}
.view-toggle-btn{flex:1;padding:8px;border-radius:10px;border:1.5px solid #E5E5EA;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray);transition:all .15s}
.view-toggle-btn.active{border-color:var(--blue);color:var(--blue);background:#F0F6FF}
.fc-dir-row{display:flex;gap:8px;margin-bottom:10px}
.fc-dir-btn{flex:1;padding:7px;border-radius:8px;border:1.5px solid #E5E5EA;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray);transition:all .15s}
.fc-dir-btn.active{border-color:var(--orange);color:var(--orange);background:#FFF8F0}
.list-flip-wrap{perspective:1200px;width:100%;margin-bottom:10px;cursor:pointer;-webkit-user-select:none;user-select:none;height:76px}
.list-flip-card{width:100%;height:76px;position:relative;transform-style:preserve-3d;transition:transform .38s ease}
.list-flip-card.flipped{transform:rotateY(180deg)}
.list-card-face{position:absolute;inset:0;border-radius:14px;background:#fff;border:1px solid #E5E5EA;box-shadow:0 2px 8px rgba(0,0,0,.06);backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;align-items:center;padding:0 16px}
.list-card-face.back{transform:rotateY(180deg)}
.list-card-fr{font-size:17px;font-weight:700;direction:ltr;flex:1;text-align:left}
.list-card-he{font-size:17px;font-weight:600;direction:rtl;flex:1;text-align:right;color:#2C2C2E}
.list-card-tts{position:absolute;top:8px;right:10px;background:none;border:none;font-size:16px;cursor:pointer;opacity:.4;padding:4px;line-height:1;color:#000}
.list-card-tts:active{opacity:1}

/* ── SHAKE ANIMATION ── */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.match-card.shake{animation:shake .22s ease;border-color:var(--red)!important;background:#FFF0ED!important;color:var(--red)!important}
</style>
</head>
<body>
<div class="offline-banner" id="offline-banner">📵 מצב אופליין — האפליקציה עובדת ללא אינטרנט</div>
<div id="app"></div>
<script>
// ════════════════════════════════════════
//  DICTIONARY — ~800 entries
// ════════════════════════════════════════
const DICT=[
// GREETINGS & BASICS

{fr:"à tout à l'heure",he:"להתראות בקרוב מאוד"},{fr:"à plus tard",he:"עד מאוחר יותר"},

{fr:"absolument",he:"בהחלט"},{fr:"exactement",he:"בדיוק"},{fr:"d'accord",he:"בסדר, מסכים"},
{fr:"c'est vrai",he:"זה נכון"},{fr:"pas du tout",he:"בכלל לא"},{fr:"bien sûr que non",he:"כמובן שלא"},
{fr:"excusez-moi",he:"סליחה (רשמי)"},{fr:"pardon",he:"סליחה"},{fr:"désolé",he:"מצטער"},
{fr:"je suis désolé",he:"אני מצטער"},{fr:"c'est ma faute",he:"זאת אשמתי"},
{fr:"comment ça va",he:"מה שלומך"},{fr:"ça va bien",he:"שלומי טוב"},{fr:"pas mal",he:"לא רע"},
{fr:"très bien",he:"מאוד טוב"},{fr:"comme ci comme ça",he:"ככה ככה"},{fr:"ça va",he:"בסדר"},
{fr:"super",he:"סופר"},{fr:"magnifique",he:"נהדר"},{fr:"formidable",he:"מדהים"},
{fr:"je ne comprends pas",he:"אני לא מבין"},{fr:"je ne sais pas",he:"אני לא יודע"},

function loadState(){
  try{
    const s=localStorage.getItem(STORAGE_KEY);
    if(s){
      const d=JSON.parse(s);
      // migrate from old key
      if(!d.folders&&localStorage.getItem('french_app_v2')){
        const old=JSON.parse(localStorage.getItem('french_app_v2'));
        if(old.folders)return{...defaultState(),...old};
      }
      if(d.folders){if(!d.recentWords)d.recentWords=[];return d;}
    }
  }catch(e){}
  return defaultState();
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function speak(text){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='fr-FR';u.rate=0.85;speechSynthesis.speak(u);}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return `${m}:${String(sec).padStart(2,'0')}`;}
function addRecent(entry){appState.recentPaths=appState.recentPaths.filter(r=>r.id!==entry.id);appState.recentPaths.unshift(entry);if(appState.recentPaths.length>5)appState.recentPaths.pop();saveState();}

// ════════════════════════════════════════
//  TREE HELPERS
// ════════════════════════════════════════
function findFolder(id,folders){for(const f of folders){if(f.id===id)return f;const r=findFolder(id,f.subfolders||[]);if(r)return r;}return null;}
function findList(id,folders){for(const f of folders){for(const l of f.lists)if(l.id===id)return l;const r=findList(id,f.subfolders||[]);if(r)return r;}return null;}
function findFolderPath(id,folders,path=[]){for(const f of folders){if(f.id===id)return[...path,f];const r=findFolderPath(id,f.subfolders||[],path.concat(f));if(r)return r;}return null;}
function getSiblingFolders(id){if(appState.folders.some(f=>f.id===id))return appState.folders;return findSiblingArr(id,appState.folders);}
function findSiblingArr(id,folders){for(const f of folders){if((f.subfolders||[]).some(sf=>sf.id===id))return f.subfolders;const r=findSiblingArr(id,f.subfolders||[]);if(r)return r;}return null;}
function deleteFolder(id,folders){return folders.filter(f=>{if(f.id===id)return false;f.subfolders=deleteFolder(id,f.subfolders||[]);return true;});}
function deleteList(id,folders){for(const f of folders){f.lists=f.lists.filter(l=>l.id!==id);if(f.subfolders)deleteList(id,f.subfolders);}}
function countWords(folder){let n=0;for(const l of folder.lists)n+=l.words.length;for(const sf of(folder.subfolders||[]))n+=countWords(sf);return n;}
function getAllWords(folders){let w=[];for(const f of folders){for(const l of f.lists)w.push(...l.words);if(f.subfolders)w.push(...getAllWords(f.subfolders));}return w;}
// Hard words appear twice in weighted pool → more likely to be selected
function weightedWords(words){const p=[];for(const w of words){p.push(w);if(w.hard)p.push(w);}return p;}

// Smart word pool: prefer uncovered words, mix in some reviewed ones
function getWordPool(words,key,count){
  if(!sessionCoverage[key])sessionCoverage[key]=new Set();
  const covered=sessionCoverage[key];
  const unique=[...new Map(words.map(w=>[w.fr,w])).values()];
  const uncovered=shuffle(unique.filter(w=>!covered.has(w.fr)));
  const coveredArr=shuffle(unique.filter(w=>covered.has(w.fr)));
  // If all covered, reset and start fresh
  if(!uncovered.length){covered.clear();return shuffle(unique).slice(0,count);}
  // Build pool: mostly uncovered, 1-2 covered for review
  const pool=[];
  let ui=0,ci=0;
  while(pool.length<count){
    if(ui<uncovered.length){
      // boost hard words
      if(uncovered[ui].hard&&pool.length<count)pool.push(uncovered[ui]);
      pool.push(uncovered[ui++]);
    } else if(ci<coveredArr.length){
      pool.push(coveredArr[ci++]);
    } else break;
  }
  const result=pool.slice(0,count);
  for(const w of result)covered.add(w.fr);
  return result;
}

function navigate(screen,data={}){
  stopMatchTimer();
  if(currentScreen==='list'&&screen!=='list'){listFcFlipped={};}
  navHistory.push({screen:currentScreen,folderId:currentFolderId,listId:currentListId});
  currentScreen=screen;
  if(data.folderId!==undefined)currentFolderId=data.folderId;
  if(data.listId!==undefined)currentListId=data.listId;
  if(data.fcWords)activeFcWords=data.fcWords;
  if(data.matchWords)activeMatchWords=data.matchWords;
  if(data.quizWords)activeQuizWords=data.quizWords;
  render();
}
function goBack(){
  if(!navHistory.length)return;
  stopMatchTimer();
  const prev=navHistory.pop();
  currentScreen=prev.screen;
  currentFolderId=prev.folderId;
  currentListId=prev.listId;
  render();
}
function goHome(){
  stopMatchTimer();
  navHistory=[];
  currentScreen='home';
  currentFolderId=null;
  currentListId=null;
  render();
}

  if(currentScreen==='list'&&currentListId)title=findList(currentListId,appState.folders)?.name||'רשימה';

  if(currentScreen==='matching')title='🧠 זיכרון';

  const rightActs=document.createElement('div');

  const leftActs=document.createElement('div');
  leftActs.className='header-actions left';

  if(navHistory.length>0){

    rightActs.appendChild(b);
  }

  // Home button (when not on home and not already showing just back)
  if(currentScreen!=='home'&&navHistory.length>1){
    const h=mkIconBtn('🏠','בית',goHome);
    rightActs.appendChild(h);
  }

  // Right-side action buttons
  if(currentScreen==='home'){
    const af=mkIconBtn('📁','הוסף תיקייה',()=>showAddFolderModal());
    const al=mkIconBtn('📝','הוסף רשימה',()=>showAddListModal());
    leftActs.appendChild(af);
    leftActs.appendChild(al);
  } else if(currentScreen==='folder'&&!isGame){
    const folder=findFolder(currentFolderId,appState.folders);
    if(folder){
      const editBtn=mkIconBtn('✏️','ערוך שם',()=>showEditNameModal('folder',folder));
      const delBtn=mkIconBtn('🗑','מחק תיקייה',()=>showDeleteModal('folder',folder));
      delBtn.classList.add('danger');
      const addBtn=mkIconBtn('⋯','הוסף',()=>showFolderAddMenu());
      leftActs.appendChild(addBtn);
      leftActs.appendChild(editBtn);
      leftActs.appendChild(delBtn);
    }
  } else if(currentScreen==='list'&&!isGame){
    const list=findList(currentListId,appState.folders);
    if(list){
      const expBtn=mkIconBtn('📤','ייצא רשימה',()=>exportList(list));
      const editBtn=mkIconBtn('✏️','ערוך שם',()=>showEditNameModal('list',list));
      const delBtn=mkIconBtn('🗑','מחק רשימה',()=>showDeleteModal('list',list));
      delBtn.classList.add('danger');
      leftActs.appendChild(expBtn);
      leftActs.appendChild(editBtn);
      leftActs.appendChild(delBtn);
    }
  }

  const titleEl=document.createElement('div');
  titleEl.className='header-title';
  titleEl.textContent=title;

  hdr.appendChild(rightActs);
  hdr.appendChild(titleEl);
  hdr.appendChild(leftActs);
  app.appendChild(hdr);

  window.onscroll=()=>hdr.classList.toggle('scrolled',window.scrollY>4);

  // Breadcrumb
  const hasBc=(currentScreen==='folder'||currentScreen==='list'||isGame);
  if(hasBc){
    app.appendChild(makeBreadcrumb());
  }

  // Screen content
  const screen=document.createElement('div');
  screen.className='screen'+(hasBc?' has-bc':'')+(isGame?' game-screen':'');

  if(currentScreen==='home')renderHome(screen);
  else if(currentScreen==='folder')renderFolder(screen);
  else if(currentScreen==='list')renderList(screen);
  else if(currentScreen==='flashcards')renderFlashcards(screen);
  else if(currentScreen==='matching')renderMatching(screen);
  else if(currentScreen==='quiz')renderQuiz(screen);

  app.appendChild(screen);

  // Sister folder navigation footer (folder screen only)
  if(currentScreen==='folder'&&currentFolderId){
    const siblings=getSiblingFolders(currentFolderId)||[];
    if(siblings.length>1){
      const idx=siblings.findIndex(f=>f.id===currentFolderId);
      const prev=idx>0?siblings[idx-1]:null;
      const next=idx<siblings.length-1?siblings[idx+1]:null;
      const footer=document.createElement('div');
      footer.className='folder-nav';
      const prevBtn=document.createElement('button');
      prevBtn.className='nav-arrow-btn';
      prevBtn.textContent='›'; // RTL: right = previous
      prevBtn.disabled=!next;
      prevBtn.onclick=()=>{if(next){addRecent({id:next.id,name:next.name,type:'folder'});navHistory.pop();currentFolderId=next.id;render();}};
      const nextBtn=document.createElement('button');
      nextBtn.className='nav-arrow-btn';
      nextBtn.textContent='‹'; // RTL: left = next
      nextBtn.disabled=!prev;
      nextBtn.onclick=()=>{if(prev){addRecent({id:prev.id,name:prev.name,type:'folder'});navHistory.pop();currentFolderId=prev.id;render();}};
      const center=document.createElement('div');
      center.className='folder-nav-center';
      center.textContent=`${idx+1} / ${siblings.length}`;
      footer.appendChild(prevBtn);
      footer.appendChild(center);
      footer.appendChild(nextBtn);
      app.appendChild(footer);
    }
  }

  if(activeModal)app.appendChild(activeModal);
}

}

function makeBreadcrumb(){
  const bc=document.createElement('div');

  const home=document.createElement('span');

  home.textContent='בית';
  home.onclick=goHome;

    const path=findFolderPath(currentFolderId,appState.folders)||[];
    for(let i=0;i<path.length;i++){

      bc.appendChild(item);
    }

      sep.className='bc-sep';
      sep.textContent=' › ';
      bc.appendChild(sep);
      const item=document.createElement('span');
      item.className='bc-item current';
      item.textContent=list.name;

    item.textContent=currentScreen==='flashcards'?'כרטיסיות':currentScreen==='quiz'?'התאמה':'זיכרון';
    bc.appendChild(item);
  }

  return bc;
}

function renderHome(screen){
  // Primary action: Add word
  const addBtn=document.createElement('button');
  addBtn.className='home-add-btn';
  addBtn.innerHTML='➕ הוסף מילה חדשה';
  addBtn.onclick=()=>{
    const allLists=[];
    function collectLists(folders){for(const f of folders){allLists.push(...f.lists);if(f.subfolders)collectLists(f.subfolders);}}
    collectLists(appState.folders);
    if(!allLists.length){alert('צור תחילה תיקייה ורשימה');return;}
    if(allLists.length===1){showAddWordModal(allLists[0]);return;}
    // show picker
    const frag=document.createDocumentFragment();
    frag.appendChild(mk('div','modal-title','בחר רשימה'));
    for(const l of allLists){
      const btn=document.createElement('button');
      btn.className='btn btn-secondary';
      btn.style.cssText='width:100%;margin-bottom:8px;text-align:right';
      btn.textContent=l.name;
      btn.onclick=()=>{closeModal();showAddWordModal(l);};
      frag.appendChild(btn);
    }
    frag.appendChild(mkBtn('btn btn-secondary','ביטול',closeModal));
    showModal(frag);
  };
  screen.appendChild(addBtn);

  // Import button
  const impBtn=document.createElement('button');
  impBtn.style.cssText='width:100%;padding:12px;border-radius:12px;border:1.5px solid #E5E5EA;background:#fff;color:#3C3C43;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px';
  impBtn.innerHTML='📥 ייבא רשימת מילים';
  impBtn.onclick=()=>triggerImport();
  screen.appendChild(impBtn);

  // Recently added words
  const rw=appState.recentWords||[];
  if(rw.length>0){
    screen.appendChild(mkSectionHeader('נוספו לאחרונה'));
    for(const w of rw.slice(0,6)){
      const row=document.createElement('div');
      row.className='recent-word-row';
      const frEl=document.createElement('span');frEl.className='recent-word-fr';frEl.textContent=w.fr;
      const heEl=document.createElement('span');heEl.className='recent-word-he';heEl.textContent=w.he;
      const listEl=document.createElement('span');listEl.className='recent-word-list';listEl.textContent=w.listName||'';
      row.appendChild(frEl);row.appendChild(heEl);row.appendChild(listEl);
      screen.appendChild(row);
    }
  }

  // Folders
  const sh=document.createElement('div');
  sh.className='section-header';
  const st=document.createElement('span');st.className='section-title';st.textContent='תיקיות';
  const allBtn=document.createElement('button');
  allBtn.className='link-btn';
  allBtn.textContent='🧠 כל המילים';
  allBtn.onclick=()=>{
    const words=getAllWords(appState.folders);
    if(!words.length){alert('אין מילים עדיין');return;}
    mgState={initialized:false};
    navigate('matching',{matchWords:shuffle(weightedWords(words)).filter((w,i,a)=>a.findIndex(x=>x.fr===w.fr)===i).slice(0,8)});
  };
  sh.appendChild(allBtn);sh.appendChild(st);
  screen.appendChild(sh);

  if(!appState.folders.length){
    screen.appendChild(makeEmpty('📁','אין תיקיות עדיין\nלחץ 📁 בראש המסך'));
  }else{
    for(const f of appState.folders)renderFolderCard(screen,f);
  }
}

      // Back face
      const back=document.createElement('div');back.className='list-card-face back';
      const backText=document.createElement('span');
      backText.className=listFcDir==='fr'?'list-card-he':'list-card-fr';
      backText.textContent=listFcDir==='fr'?w.he:w.fr;
      back.appendChild(backText);
      if(listFcDir==='he'){
        const tts=document.createElement('button');tts.className='list-card-tts';tts.textContent='🔊';
        tts.onclick=e=>{e.stopPropagation();speak(w.fr);};
        back.appendChild(tts);
      }

      card.appendChild(front);card.appendChild(back);
      wrap.appendChild(card);
      wrap.onclick=()=>{listFcFlipped[i]=!isFlipped;render();};
      screen.appendChild(wrap);
    }
  } else {
    for(let i=0;i<l.words.length;i++){
      const w=l.words[i];
      const row=document.createElement('div');
      row.className='word-row';

      const frSpan=document.createElement('span');
      frSpan.className='word-fr';
      frSpan.textContent=w.fr;

      const heSpan=document.createElement('span');
      heSpan.className='word-he';
      heSpan.textContent=w.he;

      const ttsBtn=document.createElement('button');
      ttsBtn.className='word-tts';
      ttsBtn.textContent='🔊';
      ttsBtn.onclick=e=>{e.stopPropagation();speak(w.fr);};

      const starBtn=document.createElement('button');
      starBtn.className='word-star'+(w.hard?' hard':'');
      starBtn.textContent='★';
      starBtn.title=w.hard?'מסומן לתרגול — לחץ להסרה':'סמן לתרגול נוסף';
      starBtn.onclick=e=>{e.stopPropagation();w.hard=!w.hard;saveState();render();};

      // Long press for delete menu
      let lpt=null;
      row.addEventListener('touchstart',()=>{lpt=setTimeout(()=>{lpt=null;showWordMenu(l,i);},500);},{passive:true});
      row.addEventListener('touchend',()=>{if(lpt){clearTimeout(lpt);lpt=null;}});
      row.addEventListener('touchmove',()=>{if(lpt){clearTimeout(lpt);lpt=null;}});
      row.addEventListener('contextmenu',e=>{e.preventDefault();showWordMenu(l,i);});

      // Order: French (right) | Hebrew | 🔊 | ⭕ (left)
      row.appendChild(frSpan);
      row.appendChild(heSpan);
      row.appendChild(ttsBtn);
      row.appendChild(starBtn);
      row.onclick=e=>{if(e.target===ttsBtn||e.target===starBtn)return;showEditWordModal(l,i);};
      screen.appendChild(row);
    }
  }
}

//  MATCHING GAME
// ════════════════════════════════════════
function stopMatchTimer(){
  if(matchTimer){clearInterval(matchTimer);matchTimer=null;}
}

function startMatchTimer(){
  stopMatchTimer();
  matchTimer=setInterval(()=>{
    if(!mgState.initialized)return;
    if(mgState.countdown){
      mgState.timeLeft=Math.max(0,mgState.timeLeft-1);
      if(mgState.timeLeft===0){
        stopMatchTimer();
        mgState.timeUp=true;
        render();
        return;
      }
    } else {
      mgState.elapsed=(mgState.elapsed||0)+1;
    }
    updateMatchTimerDisplay();
  },1000);
}

function updateMatchTimerDisplay(){
  const el=document.getElementById('match-timer');
  if(!el||!mgState.initialized)return;
  if(mgState.countdown){
    el.textContent=fmtTime(mgState.timeLeft);
    el.className='match-timer'+(mgState.timeLeft<=10?' urgent':'');
    const pb=document.getElementById('match-prog-fill');
    if(pb)pb.style.width=`${Math.round((mgState.timeLeft/mgState.countdownStart)*100)}%`;
  } else {
    el.textContent=fmtTime(mgState.elapsed||0);
    el.className='match-timer';
  }
}

function renderMatching(screen){
  const words=activeMatchWords;
  if(!words.length){goBack();return;}

  if(!mgState.initialized){
    const key=currentListId||'global';
    const pool=getWordPool(weightedWords([...words]),key,6);
    const countdown=mgState.pendingCountdown||false;
    mgState={
      frCards:shuffle(pool.map((w,i)=>({...w,id:'fr'+i,done:false}))),
      heCards:shuffle(pool.map((w,i)=>({...w,id:'he'+i,done:false}))),
      selectedFr:null,selectedHe:null,score:0,total:pool.length,
      initialized:true,locked:false,
      countdown:countdown,
      timeLeft:countdown?60:0,
      countdownStart:60,
      elapsed:0,
      timeUp:false,
      pendingCountdown:countdown
    };
    startMatchTimer();
  }

  const hs=parseInt(localStorage.getItem(HS_KEY)||'0',10)||0;
  const matched=mgState.frCards.filter(c=>c.done).length;

  // Top section
  const top=document.createElement('div');
  top.className='match-top';

  // Timer row
  const timerRow=document.createElement('div');
  timerRow.className='match-timer-row';

  const timerEl=document.createElement('div');
  timerEl.id='match-timer';
  timerEl.className='match-timer'+(mgState.countdown&&mgState.timeLeft<=10?' urgent':'');
  timerEl.textContent=fmtTime(mgState.countdown?mgState.timeLeft:(mgState.elapsed||0));

  const modeBtn=document.createElement('button');
  modeBtn.className='match-mode-btn'+(mgState.countdown?' active':'');
  modeBtn.textContent=mgState.countdown?'⏱ ספירה לאחור':'⏱ אתגר זמן';
  modeBtn.onclick=()=>{
    mgState.pendingCountdown=!mgState.countdown;
    mgState.initialized=false;
    stopMatchTimer();
    render();
  };

  timerRow.appendChild(timerEl);
  timerRow.appendChild(modeBtn);
  top.appendChild(timerRow);

  // Countdown progress bar
  if(mgState.countdown){
    const pb=document.createElement('div');pb.className='progress-bar';
    const pf=document.createElement('div');
    pf.id='match-prog-fill';
    pf.className='progress-fill'+(mgState.timeLeft<=10?' red':mgState.timeLeft<=30?' orange':'');
    pf.style.width=`${Math.round((mgState.timeLeft/mgState.countdownStart)*100)}%`;
    pb.appendChild(pf);
    top.appendChild(pb);
  }

  // High score
  if(hs>0){
    const hsRow=document.createElement('div');
    hsRow.className='match-hs';
    hsRow.innerHTML=`🥇 שיא: ${fmtTime(hs)}`;
    top.appendChild(hsRow);
  }

  const cr=document.createElement('div');cr.className='counter-row';
  cr.innerHTML=`<span class="counter-label">התאמות</span><span class="counter-num">${matched} / ${mgState.total}</span>`;
  top.appendChild(cr);

  screen.appendChild(top);

  // Time up screen
  if(mgState.timeUp){
    const fs=document.createElement('div');fs.className='finish-screen';
    fs.innerHTML=`<div class="finish-icon">⏰</div><div class="finish-title">הזמן נגמר!</div><div class="finish-sub">התאמת ${matched} מתוך ${mgState.total} מילים</div>`;
    const fa=document.createElement('div');fa.className='finish-actions';
    const again=document.createElement('button');again.className='btn btn-orange';again.textContent='🔄 נסה שוב';
    again.onclick=()=>{mgState={initialized:false,pendingCountdown:true};render();};
    const normal=document.createElement('button');normal.className='btn btn-secondary';normal.textContent='🎮 מצב רגיל';
    normal.onclick=()=>{mgState={initialized:false,pendingCountdown:false};render();};
    fa.appendChild(again);fa.appendChild(normal);fs.appendChild(fa);
    screen.appendChild(fs);
    return;
  }

  // Finish screen
  if(matched===mgState.total){
    stopMatchTimer();
    const elapsed=mgState.elapsed||0;
    const isCountdown=mgState.countdown;
    let newHs=false;
    if(!isCountdown&&elapsed>0){
      const prev=parseInt(localStorage.getItem(HS_KEY)||'0',10)||999999;
      if(elapsed<prev||prev===0){
        localStorage.setItem(HS_KEY,String(elapsed));
        newHs=true;
      }
    }

    const fs=document.createElement('div');fs.className='finish-screen';
    fs.innerHTML=`<div class="finish-icon">🏆</div><div class="finish-title">כל הכבוד!</div>
    <div class="finish-sub">${isCountdown?`סיימת עם ${fmtTime(mgState.timeLeft)} על השעון!`:`זמן: ${fmtTime(elapsed)}`}</div>
    ${newHs?`<div class="finish-hs">🥇 שיא חדש!</div>`:(hs>0&&!isCountdown?`<div class="finish-hs">שיא: ${fmtTime(hs)}</div>`:'')}`;

    const fa=document.createElement('div');fa.className='finish-actions';
    const again=document.createElement('button');again.className='btn btn-primary';again.textContent='🔄 שחק שוב';
    again.onclick=()=>{mgState={initialized:false,pendingCountdown:mgState.countdown};render();};
    const more=document.createElement('button');more.className='btn btn-secondary';more.textContent='🔀 מילים חדשות';
    more.onclick=()=>{
      const all=getAllWords(appState.folders);
      activeMatchWords=shuffle(all).slice(0,8);
      mgState={initialized:false,pendingCountdown:mgState.countdown};
      render();
    };
    fa.appendChild(again);fa.appendChild(more);fs.appendChild(fa);
    screen.appendChild(fs);
    return;
  }

  // Game grid
  const grid=document.createElement('div');
  grid.className='match-grid';
  const frCol=document.createElement('div');frCol.className='match-col';
  const heCol=document.createElement('div');heCol.className='match-col';

  for(const c of mgState.frCards){
    const el=document.createElement('div');
    el.className='match-card fr-card';
    el.textContent=c.fr;
    if(c.done)el.classList.add('matched');
    else if(mgState.selectedFr===c.id)el.classList.add('selected');
    el.onclick=()=>{
      if(c.done||mgState.locked)return;
      speak(c.fr);
      mgState.selectedFr=c.id;
      tryMatch();
      updateMatchCards();
    };
    frCol.appendChild(el);
  }
  for(const c of mgState.heCards){
    const el=document.createElement('div');
    el.className='match-card';
    el.textContent=c.he;
    if(c.done)el.classList.add('matched');
    else if(mgState.selectedHe===c.id)el.classList.add('selected');
    el.onclick=()=>{
      if(c.done||mgState.locked)return;
      mgState.selectedHe=c.id;
      tryMatch();
      updateMatchCards();
    };
    heCol.appendChild(el);
  }

  grid.appendChild(frCol);
  grid.appendChild(heCol);
  screen.appendChild(grid);
}

function updateMatchCards(){
  // Lightweight re-render of just the card states without full render()
  const frCards=document.querySelectorAll('.match-col:first-child .match-card');
  const heCards=document.querySelectorAll('.match-col:last-child .match-card');
  mgState.frCards.forEach((c,i)=>{
    const el=frCards[i];
    if(!el)return;
    el.className='match-card fr-card';
    if(c.done)el.classList.add('matched');
    else if(mgState.selectedFr===c.id)el.classList.add('selected');
  });
  mgState.heCards.forEach((c,i)=>{
    const el=heCards[i];
    if(!el)return;
    el.className='match-card';
    if(c.done)el.classList.add('matched');
    else if(mgState.selectedHe===c.id)el.classList.add('selected');
  });
}

function tryMatch(){
  if(!mgState.selectedFr||!mgState.selectedHe)return;
  const fr=mgState.frCards.find(c=>c.id===mgState.selectedFr);
  const he=mgState.heCards.find(c=>c.id===mgState.selectedHe);
  if(!fr||!he)return;
  mgState.locked=true;

  if(fr.fr===he.fr){
    // Correct
    const frEls=document.querySelectorAll('.match-col:first-child .match-card');
    const heEls=document.querySelectorAll('.match-col:last-child .match-card');
    const fi=mgState.frCards.indexOf(fr);
    const hi=mgState.heCards.indexOf(he);
    if(frEls[fi])frEls[fi].classList.add('correct');
    if(heEls[hi])heEls[hi].classList.add('correct');

    setTimeout(()=>{
      fr.done=true;he.done=true;
      mgState.score++;
      mgState.selectedFr=null;mgState.selectedHe=null;
      mgState.locked=false;
      if(mgState.frCards.every(c=>c.done))render();
      else updateMatchCards();
    },150);
  } else {
    // Wrong — shake + vibrate
    const frEls=document.querySelectorAll('.match-col:first-child .match-card');
    const heEls=document.querySelectorAll('.match-col:last-child .match-card');
    const fi=mgState.frCards.indexOf(fr);
    const hi=mgState.heCards.indexOf(he);
    if(frEls[fi]){frEls[fi].classList.add('wrong');frEls[fi].classList.add('shake');}
    if(heEls[hi]){heEls[hi].classList.add('wrong');heEls[hi].classList.add('shake');}
    if(navigator.vibrate)navigator.vibrate([60,30,60]);

    setTimeout(()=>{
      mgState.selectedFr=null;mgState.selectedHe=null;
      mgState.locked=false;
      updateMatchCards();
    },200);
  }
}

// ════════════════════════════════════════
//  QUIZ GAME (התאמה)
// ════════════════════════════════════════
function makeQuizOptions(word,direction,wordPool){
  const correctText=direction==='fr2he'?word.he:word.fr;
  const seen=new Set([correctText,word.he,word.fr]);
  let distractors=[];

  if(direction==='he2fr'){
    // Show Hebrew → pick French: find visually/phonetically similar French words
    const target=word.fr;
    const isVerb=target.endsWith('er')||target.endsWith('ir')||target.endsWith('re')||target.endsWith('oir');
    // Priority 1: verbs from pool if target is verb
    if(isVerb){
      const verbPool=DICT.filter(d=>!seen.has(d.fr)&&(d.fr.endsWith('er')||d.fr.endsWith('ir')||d.fr.endsWith('re')||d.fr.endsWith('oir')));
      distractors.push(...shuffle(verbPool).slice(0,6).map(d=>({text:d.fr,correct:false,frVal:d.fr})));
    }
    // Priority 2: same first 2 chars or similar length ±3
    const similar=DICT.filter(d=>!seen.has(d.fr)&&(d.fr.slice(0,2)===target.slice(0,2)||Math.abs(d.fr.length-target.length)<=3));
    distractors.push(...shuffle(similar).slice(0,6).map(d=>({text:d.fr,correct:false,frVal:d.fr})));
  } else {
    // Show French → pick Hebrew: find semantically related Hebrew words
    const target=word.he;
    const isVerb=target.startsWith('ל');
    const isTemporal=['יום','שעה','זמן','כל','כבר','תמיד','פעם','מחר','אתמול','בקר','ערב','לילה','מיד','בקרוב'].some(k=>target.includes(k));
    const isNumber=['אחד','שניים','שלושה','ארבעה','חמישה','שישה','שבעה','שמונה','תשעה','עשר','עשרים'].some(k=>target.includes(k));

    let candidates=[];
    if(isVerb){
      candidates=DICT.filter(d=>!seen.has(d.he)&&d.he.startsWith('ל'));
    } else if(isTemporal){
      candidates=DICT.filter(d=>!seen.has(d.he)&&['יום','זמן','כל','כבר','תמיד','פעם','מחר','אתמול','בקר','ערב','לילה','מיד','בקרוב','פעמים'].some(k=>d.he.includes(k)));
    } else if(isNumber){
      candidates=DICT.filter(d=>!seen.has(d.he)&&['אחד','שניים','שלושה','ארבעה','חמישה','שישה','שבעה','שמונה','תשעה','עשר','עשרים','שלושים'].some(k=>d.he.includes(k)));
    } else {
      // Similar length ±4 chars
      candidates=DICT.filter(d=>!seen.has(d.he)&&Math.abs(d.he.length-target.length)<=4);
    }
    distractors.push(...shuffle(candidates).slice(0,8).map(d=>({text:d.he,correct:false,frVal:d.fr})));
  }

  // Deduplicate
  const uniqueDist=[],usedTexts=new Set([correctText]);
  for(const d of distractors){if(!usedTexts.has(d.text)){usedTexts.add(d.text);uniqueDist.push(d);}}

  // Fill remaining with random DICT entries
  if(uniqueDist.length<4){
    const extra=shuffle(DICT.filter(d=>!usedTexts.has(direction==='fr2he'?d.he:d.fr)&&d.fr!==word.fr))
      .slice(0,4-uniqueDist.length)
      .map(d=>({text:direction==='fr2he'?d.he:d.fr,correct:false,frVal:d.fr}));
    uniqueDist.push(...extra);
  }

  return shuffle([{text:correctText,correct:true,frVal:word.fr},...uniqueDist.slice(0,4)]);
}

function renderQuizFinish(screen,q){
  const pct=Math.round((q.score/q.questions.length)*100);

    <div class="finish-title">${q.score} / ${q.questions.length} נכון</div>

  back.onclick=goBack;
  fa.appendChild(again);fa.appendChild(flip);fa.appendChild(back);
  fs.appendChild(fa);screen.appendChild(fs);
}

function renderQuiz(screen){
  if(!activeQuizWords.length){goBack();return;}

  if(!qzState.initialized){
    const dir=qzState.pendingDirection||'fr2he';
    const key='quiz_'+(currentListId||'global');
    const pool=getWordPool(weightedWords([...activeQuizWords]),key,10);
    qzState={direction:dir,questions:pool,idx:0,score:0,options:null,locked:false,initialized:true,pendingDirection:dir};
  }
  const q=qzState;

  // Finish
  if(q.idx>=q.questions.length){renderQuizFinish(screen,q);return;}

  const word=q.questions[q.idx];
  if(!q.options)q.options=makeQuizOptions(word,q.direction,activeQuizWords);

  // Direction toggle
  const dirRow=document.createElement('div');dirRow.className='quiz-dir-toggle';
  const btnFH=document.createElement('button');
  btnFH.className='quiz-dir-btn'+(q.direction==='fr2he'?' active':'');
  btnFH.textContent='🇫🇷 → 🇮🇱 צרפתית';
  btnFH.onclick=()=>{qzState={pendingDirection:'fr2he',initialized:false};render();};
  const btnHF=document.createElement('button');
  btnHF.className='quiz-dir-btn'+(q.direction==='he2fr'?' active':'');
  btnHF.textContent='🇮🇱 → 🇫🇷 עברית';
  btnHF.onclick=()=>{qzState={pendingDirection:'he2fr',initialized:false};render();};
  dirRow.appendChild(btnFH);dirRow.appendChild(btnHF);
  screen.appendChild(dirRow);

  // Progress
  const pb=document.createElement('div');pb.className='progress-bar';
  const pf=document.createElement('div');pf.className='progress-fill';
  pf.style.width=`${Math.round((q.idx/q.questions.length)*100)}%`;
  pb.appendChild(pf);screen.appendChild(pb);
  const cr=document.createElement('div');cr.className='counter-row';
  cr.innerHTML=`<span class="counter-label">שאלה</span><span class="counter-num">${q.idx+1} / ${q.questions.length}${word.hard?' ★':''}</span>`;
  screen.appendChild(cr);

  // Question card
  const qCard=document.createElement('div');qCard.className='quiz-question';
  const isFr=q.direction==='fr2he';
  const qWord=document.createElement('div');
  qWord.className='quiz-word'+(isFr?' fr':'');
  qWord.textContent=isFr?word.fr:word.he;
  qCard.appendChild(qWord);
  if(isFr){
    const ttsBtn=document.createElement('button');
    ttsBtn.style.cssText='background:none;border:none;font-size:22px;cursor:pointer;opacity:.5;margin-top:4px;padding:4px;display:block;margin-left:auto;margin-right:auto';
    ttsBtn.textContent='🔊';ttsBtn.onclick=()=>speak(word.fr);
    qCard.appendChild(ttsBtn);
  }
  screen.appendChild(qCard);

  // Options
  const opts=document.createElement('div');opts.className='quiz-options';
  const optIsFr=q.direction==='he2fr';

  for(let i=0;i<q.options.length;i++){
    const opt=q.options[i];
    const btn=document.createElement('div');
    btn.className='quiz-opt'+(optIsFr?' fr-opt':'');
    if(opt.correct)btn.dataset.correct='1';
    const textEl=document.createElement('span');textEl.className='quiz-opt-text';textEl.textContent=opt.text;
    btn.appendChild(textEl);
    if(optIsFr){
      const tts=document.createElement('button');tts.className='quiz-opt-tts';tts.textContent='🔊';
      tts.onclick=e=>{e.stopPropagation();speak(opt.text);};
      btn.appendChild(tts);
    }
    btn.onclick=()=>{
      if(q.locked)return;
      q.locked=true;
      if(opt.correct){
        btn.classList.add('correct-ans');
        q.score++;
        setTimeout(()=>{
          q.idx++;q.options=null;q.locked=false;
          render();
        },480);
      } else {
        btn.classList.add('wrong-ans');
        // Reveal correct answer
        const allBtns=document.querySelectorAll('.quiz-opt');
        allBtns.forEach(b=>{if(b.dataset.correct==='1')b.classList.add('reveal-ans');});
        setTimeout(()=>{
          btn.classList.remove('wrong-ans');
          q.locked=false;
        },700);
      }
    };
    opts.appendChild(btn);
  }
  screen.appendChild(opts);
}

function exportList(list){
  const data={
    version:1,
    exported:new Date().toISOString().slice(0,10),
    listName:list.name,
    words:list.words.map(w=>({fr:w.fr,he:w.he,hard:!!w.hard}))
  };

  a.href=url;a.download=list.name.replace(/\s+/g,'_')+'_french.json';
  document.body.appendChild(a);a.click();

function triggerImport(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json,image/*';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.type.startsWith('image/')){processImageImport(file);return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const words=Array.isArray(data)?data:(data.words||[]);
        if(!words.length)throw new Error('הקובץ ריק');
        if(!words[0].fr||!words[0].he)throw new Error('פורמט לא מוכר');
        const suggestedName=data.listName||'';
        processImport(words,suggestedName);
      }catch(err){alert('שגיאה בקריאת הקובץ: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

let _tesseractLoading=null;
function loadTesseract(){
  if(window.Tesseract)return Promise.resolve(window.Tesseract);
  if(_tesseractLoading)return _tesseractLoading;
  _tesseractLoading=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js';
    s.onload=()=>res(window.Tesseract);s.onerror=rej;
    document.head.appendChild(s);
  });
  return _tesseractLoading;
}

async function processImageImport(file){
  // מודאל טעינה
  const frag=document.createDocumentFragment();
  frag.appendChild(mk('div','modal-title','מעבד תמונה...'));
  const spin=mk('div','','⏳');spin.style.cssText='text-align:center;font-size:36px;margin:16px 0';
  const status=mk('div','','טוען מנוע זיהוי טקסט...');
  status.style.cssText='text-align:center;color:var(--gray);font-size:14px;margin-bottom:20px';
  frag.appendChild(spin);frag.appendChild(status);
  showModal(frag);
  try{
    const T=await loadTesseract();
    status.textContent='מזהה טקסט בתמונה...';
    const result=await T.recognize(file,'heb+fra',{
      logger:m=>{if(m.status==='recognizing text')status.textContent=`מזהה... ${Math.round((m.progress||0)*100)}%`;}
    });
    const pairs=parseOcrText(result.data.text);
    closeModal();
    if(!pairs.length){alert('לא זוהו זוגות מילים בתמונה. ודא שהתמונה ברורה ומכילה עמודות צרפתית ועברית.');return;}
    showOcrPreviewModal(pairs);
  }catch(e){closeModal();alert('שגיאה בעיבוד התמונה: '+e.message);}
}

function parseOcrText(text){
  const heRe=/[ְ-׿יִ-ﭏ]/;
  const frRe=/[a-zA-ZÀ-ÿ]/;
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  const pairs=[];
  for(const line of lines){
    if(!heRe.test(line)||!frRe.test(line))continue;
    let fr='',he='';
    // נסה פיצול לפי מפרידים נפוצים
    const parts=line.split(/[\t\-–—|=:\/،,]+/);
    for(const p of parts){
      const t=p.trim();if(!t)continue;
      if(heRe.test(t)&&!he)he=t;
      else if(frRe.test(t)&&!fr)fr=t;
    }
    // fallback: חלץ כל חלק לפי סוג כתב
    if(!fr||!he){
      const hm=line.match(/[ְ-׿יִ-ﭏ\sא-ת]+/);
      const fm=line.match(/[a-zA-ZÀ-ÿ'\s\-]+/);
      if(hm)he=hm[0].trim();if(fm)fr=fm[0].trim();
    }
    fr=fr.replace(/^\d+[\.\)]\s*/,'').trim();
    he=he.replace(/^\d+[\.\)]\s*/,'').trim();
    if(fr.length>1&&he.length>1)pairs.push({fr,he,hard:false});
  }
  return pairs;
}

function showOcrPreviewModal(pairs){
  const frag=document.createDocumentFragment();
  const title=mk('div','modal-title',`זוהו ${pairs.length} מילים`);
  frag.appendChild(title);
  const sub=mk('div','','ערוך ומחק שגיאות לפני הייבוא:');
  sub.style.cssText='font-size:13px;color:var(--gray);text-align:center;margin-bottom:12px';
  frag.appendChild(sub);
  const list=document.createElement('div');
  list.style.cssText='max-height:270px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:14px';
  const active=pairs.map((p,i)=>({...p,_del:false}));
  active.forEach((p,i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:6px;background:#F5F5F7;border-radius:10px;padding:8px 10px';
    const heInp=document.createElement('input');heInp.value=p.he;
    heInp.style.cssText='flex:1;border:none;background:transparent;font-size:14px;direction:rtl;min-width:0';
    heInp.oninput=()=>{active[i].he=heInp.value.trim();};
    const sep=mk('span','','·');sep.style.cssText='color:#ccc;flex-shrink:0';
    const frInp=document.createElement('input');frInp.value=p.fr;
    frInp.style.cssText='flex:1;border:none;background:transparent;font-size:14px;direction:ltr;min-width:0';
    frInp.oninput=()=>{active[i].fr=frInp.value.trim();};
    const del=document.createElement('button');del.textContent='✕';
    del.style.cssText='border:none;background:none;color:var(--red);font-size:15px;cursor:pointer;padding:0 2px;flex-shrink:0';
    del.onclick=()=>{active[i]._del=true;row.style.display='none';};
    row.appendChild(heInp);row.appendChild(sep);row.appendChild(frInp);row.appendChild(del);
    list.appendChild(row);
  });
  frag.appendChild(list);
  const acts=document.createElement('div');acts.className='modal-actions';
  acts.appendChild(mkBtn('btn btn-secondary','ביטול',closeModal));
  acts.appendChild(mkBtn('btn btn-primary','ייבא',()=>{
    const toImport=active.filter(p=>!p._del&&p.fr&&p.he);
    if(!toImport.length){alert('לא נותרו מילים');return;}
    closeModal();processImport(toImport,'');
  }));
  frag.appendChild(acts);
  showModal(frag);
}

function processImport(words,suggestedName){
  // אסוף את כל ה-fr הקיימים
  const existingFr=new Set();
  function collectFr(folders){
    for(const f of folders){
      for(const l of f.lists)for(const w of l.words)existingFr.add(w.fr.trim().toLowerCase());
      if(f.subfolders)collectFr(f.subfolders);
    }
  }
  collectFr(appState.folders);
  const newWords=words.filter(w=>w.fr&&w.he&&!existingFr.has(w.fr.trim().toLowerCase()));
  const skipped=words.length-newWords.length;
  showImportSummaryModal(newWords,skipped,suggestedName);
}

function showImportSummaryModal(newWords,skipped,suggestedName){
  // בנה רשימת תיקיות
  const allFolders=[];
  function collectFolders(folders,path=''){
    for(const f of folders){
      const fp=path?path+' / '+f.name:f.name;
      allFolders.push({folder:f,label:fp});
      if(f.subfolders)collectFolders(f.subfolders,fp);
    }
  }
  collectFolders(appState.folders);

  // בנה רשימת lists
  const allLists=[];
  function collectLists(folders,path=''){
    for(const f of folders){
      const fp=path?path+' / '+f.name:f.name;
      for(const l of f.lists)allLists.push({list:l,label:fp+' / '+l.name});
      if(f.subfolders)collectLists(f.subfolders,fp);
    }
  }
  collectLists(appState.folders);

  const frag=document.createDocumentFragment();
  frag.appendChild(mk('div','modal-title','📥 ייבוא מילים'));

  const summary=document.createElement('p');
  summary.style.cssText='text-align:center;color:#3C3C43;margin-bottom:16px;line-height:1.8';
  summary.innerHTML=newWords.length
    ?`<strong>${newWords.length}</strong> מילים חדשות יתווספו<br><small style="color:var(--gray)">${skipped} מילים כבר קיימות — דולגו</small>`
    :`<strong>כל המילים כבר קיימות באפליקציה (${skipped})</strong>`;
  frag.appendChild(summary);

  if(!newWords.length){
    frag.appendChild(mkBtn('btn btn-secondary','סגור',closeModal));
    showModal(frag);return;
  }

  // Toggle: רשימה חדשה / רשימה קיימת
  const toggle=document.createElement('div');
  toggle.style.cssText='display:flex;gap:8px;margin-bottom:12px';
  const btnNew=document.createElement('button');btnNew.className='fc-dir-btn active';btnNew.textContent='+ רשימה חדשה';
  const btnExist=document.createElement('button');btnExist.className='fc-dir-btn';btnExist.textContent='רשימה קיימת';
  toggle.appendChild(btnNew);toggle.appendChild(btnExist);
  frag.appendChild(toggle);

  // סקשן רשימה חדשה
  const newSection=document.createElement('div');
  const nameLabel=mk('div','modal-label','שם הרשימה:');
  const nameInp=mkInput('text','שם הרשימה החדשה',25);
  nameInp.value=suggestedName||'רשימה מיובאת';
  nameInp.style.marginBottom='10px';
  const folderLabel=mk('div','modal-label','שייך לתיקייה:');
  const folderSel=document.createElement('select');folderSel.className='select-field';
  for(const {folder,label} of allFolders){
    const o=document.createElement('option');o.value=folder.id;o.textContent=label;folderSel.appendChild(o);
  }
  if(!allFolders.length){const o=document.createElement('option');o.textContent='אין תיקיות';folderSel.appendChild(o);}
  newSection.appendChild(nameLabel);newSection.appendChild(nameInp);
  newSection.appendChild(folderLabel);newSection.appendChild(folderSel);
  frag.appendChild(newSection);

  // סקשן רשימה קיימת
  const existSection=document.createElement('div');existSection.style.display='none';
  const existLabel=mk('div','modal-label','בחר רשימה:');
  const listSel=document.createElement('select');listSel.className='select-field';
  for(const {list,label} of allLists){
    const o=document.createElement('option');o.value=list.id;o.textContent=label;listSel.appendChild(o);
  }
  if(!allLists.length){const o=document.createElement('option');o.textContent='אין רשימות קיימות';listSel.appendChild(o);}
  existSection.appendChild(existLabel);existSection.appendChild(listSel);
  frag.appendChild(existSection);

  let mode='new';
  btnNew.onclick=()=>{mode='new';btnNew.className='fc-dir-btn active';btnExist.className='fc-dir-btn';newSection.style.display='';existSection.style.display='none';};
  btnExist.onclick=()=>{mode='existing';btnExist.className='fc-dir-btn active';btnNew.className='fc-dir-btn';existSection.style.display='';newSection.style.display='none';};

  const acts=document.createElement('div');acts.className='modal-actions';
  const cancel=mkBtn('btn btn-secondary','ביטול',closeModal);
  const addBtn=mkBtn('btn btn-primary',`הוסף ${newWords.length} מילים`,()=>{
    if(mode==='new'){
      const name=(nameInp.value.trim()||'רשימה מיובאת').slice(0,25);
      const targetFolder=findFolder(folderSel.value,appState.folders)||appState.folders[0];
      if(!targetFolder){alert('בחר תיקייה תחילה');return;}
      const newList={id:uid(),name,words:newWords.map(w=>({fr:w.fr,he:w.he,hard:!!w.hard}))};
      targetFolder.lists.push(newList);
    } else {
      const targetList=findList(listSel.value,appState.folders);
      if(!targetList){alert('לא נמצאה רשימה');return;}
      const existInList=new Set(targetList.words.map(w=>w.fr.trim().toLowerCase()));
      const toAdd=newWords.filter(w=>!existInList.has(w.fr.trim().toLowerCase()));
      targetList.words.push(...toAdd.map(w=>({fr:w.fr,he:w.he,hard:!!w.hard})));
    }
    saveState();closeModal();
  });
  acts.appendChild(cancel);acts.appendChild(addBtn);
  frag.appendChild(acts);
  const m=showModal(frag);
  setTimeout(()=>m.querySelector('input[type=text]')?.focus(),100);
}

// ════════════════════════════════════════
//  תיקייה ריקה — הוספה מהירה
// ════════════════════════════════════════

function showQuickAddToFolder(folder){
  const frag=document.createDocumentFragment();
  frag.appendChild(mk('div','modal-title','הוסף מילה ראשונה'));
  frag.appendChild(mk('div','modal-label','שם הרשימה:'));
  const listInp=mkInput('text','שם הרשימה (עד 25 תווים)',25);
  listInp.value='רשימה 1';listInp.style.marginBottom='12px';
  frag.appendChild(listInp);
  frag.appendChild(mk('div','modal-label','מילה:'));
  const {frWrap,heWrap,frInp,heInp}=makeWordInputs();
  const acts=document.createElement('div');acts.className='modal-actions';
  const cancel=mkBtn('btn btn-secondary','ביטול',closeModal);
  const add=mkBtn('btn btn-primary','הוסף',()=>{
    const fr=frInp.value.trim();const he=heInp.value.trim();
    if(!fr||!he){alert('מלא צרפתית ועברית');return;}
    const name=(listInp.value.trim()||'רשימה 1').slice(0,25);
    folder.lists.push({id:uid(),name,words:[{fr,he}]});
    saveState();closeModal();
  });
  acts.appendChild(cancel);acts.appendChild(add);
  frag.appendChild(frWrap);frag.appendChild(heWrap);frag.appendChild(acts);
  const m=showModal(frag);
  setTimeout(()=>listInp.focus(),100);
}

// ── Word Long-Press Menu ──
function showWordMenu(list,idx){
  const w=list.words[idx];
  const bg=document.createElement('div');
  bg.className='modal-bg';
  bg.onclick=e=>{if(e.target===bg)closeModal();};
  const sheet=document.createElement('div');sheet.className='menu-sheet';
  const items=[
    {icon:'✏️',label:'ערוך מילה',fn:()=>{closeModal();showEditWordModal(list,idx);}},
    {icon:'🔊',label:'האזן למילה',fn:()=>{closeModal();speak(w.fr);}},
    {icon:'🗑',label:'מחק מילה',danger:true,fn:()=>{list.words.splice(idx,1);saveState();closeModal();}}
  ];
  for(const item of items){
    const row=document.createElement('div');row.className='menu-item';
    if(item.danger)row.style.color='var(--red)';
    row.appendChild(mk('span','menu-item-icon',item.icon));
    const lbl=document.createElement('span');lbl.textContent=item.label;row.appendChild(lbl);
    row.onclick=item.fn;
    sheet.appendChild(row);sheet.appendChild(mk('div','menu-sep',''));
  }
  const cancel=document.createElement('div');cancel.className='menu-cancel';cancel.textContent='ביטול';cancel.onclick=closeModal;
  sheet.appendChild(cancel);
  bg.appendChild(sheet);activeModal=bg;render();
}

// ── Word Input Helper ──
function makeWordInputs(initFr='',initHe=''){
  const frWrap=document.createElement('div');frWrap.className='inp-wrap';
  const frInp=mkInput('text','צרפתית',100);
  frInp.style.direction='ltr';frInp.value=initFr;
  const frDd=document.createElement('div');frDd.className='dropdown';frDd.style.display='none';
  frWrap.appendChild(frInp);frWrap.appendChild(frDd);

  const heWrap=document.createElement('div');heWrap.className='inp-wrap';
  const heInp=mkInput('text','עברית',100);
  heInp.value=initHe;
  const heDd=document.createElement('div');heDd.className='dropdown';heDd.style.display='none';
  heWrap.appendChild(heInp);heWrap.appendChild(heDd);

  function buildDd(dd,matches,pickFn){
    dd.innerHTML='';
    if(!matches.length){dd.style.display='none';return;}
    dd.style.display='block';
    for(const d of matches){
      const item=document.createElement('div');
      item.className='dropdown-item';
      item.innerHTML=`<span class="dd-fr" style="direction:ltr">${d.fr}</span><span class="dd-he">${d.he}</span>`;
      item.onmousedown=e=>{e.preventDefault();pickFn(d);};
      item.ontouchstart=e=>{e.preventDefault();pickFn(d);};
      dd.appendChild(item);
    }
  }

  frInp.oninput=()=>{
    frInp.classList.remove('from-dict');
    const v=frInp.value.toLowerCase();
    buildDd(frDd,DICT.filter(d=>d.fr.toLowerCase().startsWith(v)&&v.length>0).slice(0,7),d=>{
      frInp.value=d.fr;heInp.value=d.he;
      frInp.classList.add('from-dict');heInp.classList.add('from-dict');
      frDd.style.display='none';heDd.style.display='none';
    });
  };
  frInp.onblur=()=>setTimeout(()=>frDd.style.display='none',200);

  heInp.oninput=()=>{
    heInp.classList.remove('from-dict');
    const v=heInp.value;
    buildDd(heDd,DICT.filter(d=>d.he.startsWith(v)&&v.length>0).slice(0,7),d=>{
      heInp.value=d.he;frInp.value=d.fr;
      frInp.classList.add('from-dict');heInp.classList.add('from-dict');
      frDd.style.display='none';heDd.style.display='none';
    });
  };
  heInp.onblur=()=>setTimeout(()=>heDd.style.display='none',200);

  return{frWrap,heWrap,frInp,heInp};
}

// ════════════════════════════════════════
//  DOM HELPERS
// ════════════════════════════════════════
function mk(tag,cls,text){
  const el=document.createElement(tag);
  if(cls)el.className=cls;
  if(text)el.textContent=text;
  return el;
}
function mkInput(type,placeholder,maxlength){
  const el=document.createElement('input');
  el.type=type;el.placeholder=placeholder;
  if(maxlength)el.maxLength=maxlength;
  return el;
}
function mkBtn(cls,text,onclick){
  const b=document.createElement('button');
  b.className=cls;b.textContent=text;b.onclick=onclick;
  return b;
}

// ════════════════════════════════════════
//  OFFLINE & SERVICE WORKER
// ════════════════════════════════════════
window.addEventListener('online',()=>document.getElementById('offline-banner').classList.remove('show'));
window.addEventListener('offline',()=>document.getElementById('offline-banner').classList.add('show'));
if(!navigator.onLine)document.getElementById('offline-banner').classList.add('show');
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/french-app/sw.js').then(reg=>{
    // כשיש גרסה חדשה — טען מחדש אוטומטית
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='activated')window.location.reload();
      });
    });
    // בדוק עדכון בכל פתיחה
    reg.update();
  }).catch(()=>{});
}

render();
